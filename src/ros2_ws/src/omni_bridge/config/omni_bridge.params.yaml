omni_can_bridge:
  ros__parameters:
    platform_name: omni4
    platform_config: ''
    can_channel: can0
    status_poll_period_sec: 0.5
    watchdog_timeout_sec: 0.8
    cmd_vel_timeout_stop: true
    wheel_names:
      - front_left
      - front_right
      - rear_left
      - rear_right

    max_linear_x: 1.0
    max_angular_z: 1.0
    linear_deadband: 0.05
    angular_deadband: 0.05
    min_speed_pct: 30
    max_speed_pct: 100

omni_odometry:
  ros__parameters:
    wheel_states_topic: /omni/wheel_states
    base_status_topic: /omni/base_status
    motion_cmd_topic: /omni/motion_cmd
    cmd_vel_topic: /cmd_vel
    odom_topic: /odom
    odom_frame_id: odom
    base_frame_id: base_link
    laser_frame_id: laser
    publish_tf: true
    publish_laser_tf: true
    wheel_count: 4

    # Forward calibration:
    # - 2026-06-27: 6 measured 3-second FORWARD runs at 40% -> 0.00012227.
    # - 2026-06-27: 3 measured 1-second FORWARD runs at 30% refined scale by 1.115557932.
    # - 2026-06-27: 3 robust 1-second FORWARD runs at 30% refined scale to 0.00014138.
    # - 2026-06-27: 3 fixed 0.7-second FORWARD runs at 30%, measured by TF-Luna -> 0.00014739.
    # - 2026-06-27: 1 fixed 0.7-second TF-Luna control run refined scale to 0.00014656.
    # - 2026-06-27: 3 fixed 0.7-second TF-Luna control runs refined scale to 0.00015617.
    # - 2026-06-27: 3 fixed 0.7-second TF-Luna final control showed +1.10% odom error; kept 0.00015617.
    # Lateral calibration:
    # - 2026-06-28: 3 LEFT/RIGHT cycles at 35% on smooth floor measured by TF-Luna:
    #   real 0.595000 m, odom 0.589229 m, weighted error -0.97%; kept 0.00015617.
    # Rotation calibration:
    # - 2026-06-28: ROTATE_CW 35% for 5.0 s, odom 34.658 deg, real about 200 deg.
    #   Scale 5.770491 -> radians_per_tick 0.00057705.
    # - 2026-06-28: ROTATE_CW 35% for 2.3 s control, odom 138.796 deg, real about 170 deg.
    #   Scale 1.224815 -> radians_per_tick 0.00070678.
    # - 2026-06-28: ROTATE_CW 35% for 2.44 s control, odom 176.469 deg, real about 170 deg.
    #   Scale 0.963340 -> radians_per_tick 0.00068087.
    # - 2026-06-28: ROTATE_CW 35% for 5.31 s 360-control, odom 366.030 deg, real about 341 deg.
    #   Scale 0.931617 -> radians_per_tick 0.00063431.
    # - 2026-06-28: ROTATE_CW 35% for 5.51 s control, physical 360 deg (+/-1 deg), odom 367.222 deg.
    #   Scale 0.980334 -> radians_per_tick 0.00062184.
    # Practical timing on smooth floor at 35%: 360 deg ~= 5.51 s, 180 deg ~= 2.71 s.
    meters_per_tick: 0.00015617
    radians_per_tick: 0.00062184

    publish_period_sec: 0.05
    velocity_timeout_sec: 0.35
    stale_wheel_age_sec: 0.6
    min_delta_ticks: 0

    # Measure this on the chassis. Current default means: lidar centered on
    # the robot, 12 cm above base_link, facing forward.
    laser_xyz: [0.0, 0.0, 0.12]
    laser_rpy: [0.0, 0.0, 0.0]

tf_luna_front:
  ros__parameters:
    serial_port: /dev/ttyAMA0
    baudrate: 115200
    frame_id: tf_luna_front
    range_topic: /range/front
    status_topic: /sensors/tf_luna/front
    min_range_m: 0.2
    max_range_m: 8.0
    field_of_view_rad: 0.0349066
    publish_rate_hz: 20.0
    read_timeout_sec: 0.1
    reconnect_period_sec: 2.0
    publish_json_status: true
