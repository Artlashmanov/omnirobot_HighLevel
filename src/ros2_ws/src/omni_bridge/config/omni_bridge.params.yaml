omni_can_bridge:
  ros__parameters:
    platform_name: omni4
    platform_config: ''
    can_channel: can0
    status_poll_period_sec: 0.5
    watchdog_timeout_sec: 0.8
    cmd_vel_timeout_stop: true
    wheel_names:
      - front_left
      - front_right
      - rear_left
      - rear_right

    max_linear_x: 1.0
    max_angular_z: 1.0
    linear_deadband: 0.05
    angular_deadband: 0.05
    min_speed_pct: 30
    max_speed_pct: 100

omni_odometry:
  ros__parameters:
    wheel_states_topic: /omni/wheel_states
    base_status_topic: /omni/base_status
    odom_topic: /odom
    odom_frame_id: odom
    base_frame_id: base_link
    laser_frame_id: laser
    publish_tf: true
    publish_laser_tf: true
    wheel_count: 4

    # Forward calibration from 6 measured 3-second FORWARD runs at 40%.
    # Total odom before calibration: 3.723725 m; real travel: 4.553 m.
    # Scale factor: 1.222700387. Rotation is still a placeholder.
    meters_per_tick: 0.00012227
    radians_per_tick: 0.00010

    publish_period_sec: 0.05
    velocity_timeout_sec: 0.35
    stale_wheel_age_sec: 0.6
    min_delta_ticks: 0

    # Measure this on the chassis. Current default means: lidar centered on
    # the robot, 12 cm above base_link, facing forward.
    laser_xyz: [0.0, 0.0, 0.12]
    laser_rpy: [0.0, 0.0, 0.0]
