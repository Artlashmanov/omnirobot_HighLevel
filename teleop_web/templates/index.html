<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Omni Robot Teleop</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #eee;
      margin: 0;
      padding: 20px;
      text-align: center;
    }
    h1 { margin-bottom: 8px; }
    h2 { margin: 0 0 10px; font-size: 18px; }
    .status { margin-bottom: 10px; color: #aaa; min-height: 24px; }
    .mode-status { margin-bottom: 20px; color: #8fd3ff; min-height: 24px; }
    .mode-wrap {
      margin: 16px auto 20px;
      display: flex;
      gap: 10px;
      justify-content: center;
      max-width: 320px;
    }
    .slider-wrap {
      margin: 20px auto;
      max-width: 320px;
    }
    .grid {
      display: grid;
      grid-template-columns: 110px 110px 110px;
      grid-template-rows: 90px 90px 90px 90px;
      gap: 12px;
      justify-content: center;
      margin-top: 24px;
    }
    button {
      font-size: 16px;
      border: none;
      border-radius: 14px;
      background: #2a2a2a;
      color: white;
      cursor: pointer;
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
      min-height: 52px;
    }
    button:active { background: #444; }
    .stop { background: #8b1e1e; }
    .mode-btn { min-width: 120px; }
    .mode-btn.active {
      background: #145a32;
      box-shadow: 0 0 0 2px #2ecc71 inset;
    }
    .mode-btn.inactive {
      background: #2a2a2a;
      box-shadow: none;
    }
    .state-wrap {
      display: grid;
      grid-template-columns: minmax(280px, 420px) minmax(320px, 620px);
      gap: 14px;
      justify-content: center;
      align-items: start;
      margin: 24px auto 8px;
      max-width: 1100px;
      text-align: left;
    }
    .state-card {
      background: #1b1b1b;
      border: 1px solid #333;
      border-radius: 14px;
      padding: 14px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.22);
    }
    .kv {
      display: grid;
      grid-template-columns: 150px 1fr;
      gap: 6px 10px;
      font-size: 14px;
      color: #ddd;
    }
    .muted { color: #888; }
    .ok { color: #7dff9b; }
    .warn { color: #ffcc66; }
    .bad { color: #ff7777; }
    table {
      border-collapse: collapse;
      width: 100%;
      font-size: 14px;
    }
    th, td {
      border-bottom: 1px solid #333;
      padding: 7px 6px;
      text-align: right;
    }
    th:first-child, td:first-child,
    th:nth-child(2), td:nth-child(2) { text-align: left; }
    @media (max-width: 820px) {
      .state-wrap { grid-template-columns: 1fr; }
      table { font-size: 12px; }
      th, td { padding: 6px 4px; }
    }
  </style>
</head>
<body>
  <h1>Omni Robot Teleop</h1>
  <div class="status" id="status">Ready</div>
  <div class="mode-status" id="modeStatus">Control mode: unknown</div>

  <div class="mode-wrap">
    <button class="mode-btn" id="mode_auto">AUTO</button>
    <button class="mode-btn" id="mode_manual">MANUAL</button>
  </div>

  <div class="slider-wrap">
    <label for="speed">Speed %</label><br>
    <input id="speed" type="range" min="10" max="100" step="5" value="40" style="width: 100%;">
    <div id="speedValue">40</div>
  </div>

  <div class="grid">
    <div></div>
    <button id="forward">Forward</button>
    <div></div>

    <button id="rotate_ccw">Rotate CCW</button>
    <button class="stop" id="stop">Stop</button>
    <button id="rotate_cw">Rotate CW</button>

    <button id="left">Left</button>
    <div></div>
    <button id="right">Right</button>

    <div></div>
    <button id="backward">Backward</button>
    <div></div>
  </div>

  <div class="state-wrap">
    <section class="state-card">
      <h2>Base status</h2>
      <div class="kv">
        <div class="muted">ROS bridge</div><div id="bridgeState">waiting...</div>
        <div class="muted">Motion</div><div id="baseMotion">?</div>
        <div class="muted">Speed %</div><div id="baseSpeed">?</div>
        <div class="muted">Wheel count</div><div id="baseWheelCount">?</div>
        <div class="muted">Encoders</div><div id="baseEncoders">?</div>
        <div class="muted">CAN errors</div><div id="baseErrors">?</div>
      </div>
    </section>

    <section class="state-card">
      <h2>Wheel states</h2>
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Name</th>
            <th>? ticks</th>
            <th>ticks/s</th>
            <th>Moving</th>
            <th>Age</th>
          </tr>
        </thead>
        <tbody id="wheelRows">
          <tr><td colspan="6" class="muted">waiting...</td></tr>
        </tbody>
      </table>
    </section>
  </div>

  <script>
    const statusEl = document.getElementById('status');
    const modeStatusEl = document.getElementById('modeStatus');
    const speedEl = document.getElementById('speed');
    const speedValueEl = document.getElementById('speedValue');
    const modeAutoBtn = document.getElementById('mode_auto');
    const modeManualBtn = document.getElementById('mode_manual');

    const bridgeStateEl = document.getElementById('bridgeState');
    const baseMotionEl = document.getElementById('baseMotion');
    const baseSpeedEl = document.getElementById('baseSpeed');
    const baseWheelCountEl = document.getElementById('baseWheelCount');
    const baseEncodersEl = document.getElementById('baseEncoders');
    const baseErrorsEl = document.getElementById('baseErrors');
    const wheelRowsEl = document.getElementById('wheelRows');

    let repeatTimer = null;
    let currentControlMode = 'UNKNOWN';

    function getSpeed() {
      return parseInt(speedEl.value, 10);
    }

    function updateSpeedLabel() {
      speedValueEl.textContent = speedEl.value;
    }

    function updateModeButtons() {
      modeStatusEl.textContent = `Control mode: ${currentControlMode}`;

      modeAutoBtn.classList.remove('active', 'inactive');
      modeManualBtn.classList.remove('active', 'inactive');

      if (currentControlMode === 'AUTO') {
        modeAutoBtn.classList.add('active');
        modeManualBtn.classList.add('inactive');
      } else if (currentControlMode === 'MANUAL') {
        modeManualBtn.classList.add('active');
        modeAutoBtn.classList.add('inactive');
      } else {
        modeAutoBtn.classList.add('inactive');
        modeManualBtn.classList.add('inactive');
      }
    }

    function classForBool(value) {
      return value ? 'ok' : 'warn';
    }

    function renderBaseStatus(baseStatus) {
      if (!baseStatus) {
        bridgeStateEl.textContent = 'waiting for /omni/base_status';
        bridgeStateEl.className = 'warn';
        baseMotionEl.textContent = '?';
        baseSpeedEl.textContent = '?';
        baseWheelCountEl.textContent = '?';
        baseEncodersEl.textContent = '?';
        baseErrorsEl.textContent = '?';
        return;
      }

      bridgeStateEl.textContent = `seq ${baseStatus.seq}`;
      bridgeStateEl.className = 'ok';
      baseMotionEl.textContent = `${baseStatus.motion_mode_name || baseStatus.motion_mode}`;
      baseSpeedEl.textContent = `${baseStatus.speed_pct}`;
      baseWheelCountEl.textContent = `${baseStatus.wheel_count}`;
      baseEncodersEl.textContent = baseStatus.encoders_ready ? 'ready' : 'not ready';
      baseEncodersEl.className = classForBool(baseStatus.encoders_ready);

      const canErrors = [];
      if (baseStatus.can_tx_errors_seen) canErrors.push('TX');
      if (baseStatus.can_rx_errors_seen) canErrors.push('RX');
      baseErrorsEl.textContent = canErrors.length ? canErrors.join(', ') : 'none';
      baseErrorsEl.className = canErrors.length ? 'bad' : 'ok';
    }

    function renderWheelStates(wheelStates) {
      const wheels = wheelStates && Array.isArray(wheelStates.wheels) ? wheelStates.wheels : [];
      if (!wheels.length) {
        wheelRowsEl.innerHTML = '<tr><td colspan="6" class="muted">waiting for /omni/wheel_states</td></tr>';
        return;
      }

      wheelRowsEl.innerHTML = wheels.map((wheel) => {
        const movingClass = wheel.moving ? 'ok' : 'muted';
        const age = typeof wheel.last_update_age_sec === 'number'
          ? wheel.last_update_age_sec.toFixed(2)
          : '?';
        return `
          <tr>
            <td>${wheel.wheel_index}</td>
            <td>${wheel.name || `wheel_${wheel.wheel_index}`}</td>
            <td>${wheel.delta_ticks}</td>
            <td>${wheel.speed_ticks_per_sec}</td>
            <td class="${movingClass}">${wheel.moving ? 'yes' : 'no'}</td>
            <td>${age}s</td>
          </tr>`;
      }).join('');
    }

    async function refreshState() {
      try {
        const response = await fetch('/api/state');
        const data = await response.json();
        if (!response.ok || !data.ok) {
          bridgeStateEl.textContent = 'state API error';
          bridgeStateEl.className = 'bad';
          return;
        }

        const state = data.state || {};
        currentControlMode = String(state.control_mode || currentControlMode || 'UNKNOWN').toUpperCase();
        updateModeButtons();
        renderBaseStatus(state.base_status);
        renderWheelStates(state.wheel_states);
      } catch (e) {
        bridgeStateEl.textContent = 'web disconnected';
        bridgeStateEl.className = 'bad';
      }
    }

    async function refreshControlMode() {
      try {
        const response = await fetch('/api/control_mode');
        const data = await response.json();
        if (response.ok && data.ok) {
          currentControlMode = String(data.control_mode || 'UNKNOWN').toUpperCase();
          updateModeButtons();
        } else {
          modeStatusEl.textContent = 'Control mode: server error';
        }
      } catch (e) {
        modeStatusEl.textContent = 'Control mode: disconnected';
      }
    }

    async function setControlMode(controlMode) {
      try {
        const response = await fetch('/api/control_mode', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ control_mode: controlMode })
        });

        const data = await response.json();
        if (response.ok && data.ok) {
          currentControlMode = String(data.control_mode || controlMode).toUpperCase();
          updateModeButtons();
          statusEl.textContent = `Control mode set: ${currentControlMode}`;
        } else {
          statusEl.textContent = 'Failed to set control mode';
        }
      } catch (e) {
        statusEl.textContent = 'Disconnected';
      }
    }

    speedEl.addEventListener('input', updateSpeedLabel);
    updateSpeedLabel();
    updateModeButtons();

    async function sendMode(mode) {
      try {
        const response = await fetch('/api/move', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            mode: mode,
            speed_pct: mode === 'STOP' ? 0 : getSpeed()
          })
        });

        if (response.ok) {
          statusEl.textContent = `Command: ${mode} speed=${mode === 'STOP' ? 0 : getSpeed()}%`;
        } else {
          statusEl.textContent = 'Server error';
        }
      } catch (e) {
        statusEl.textContent = 'Disconnected';
      }
    }

    function startRepeating(mode) {
      stopRepeating();
      sendMode(mode);
      repeatTimer = setInterval(() => sendMode(mode), 100);
    }

    function stopRepeating() {
      if (repeatTimer) {
        clearInterval(repeatTimer);
        repeatTimer = null;
      }
    }

    function bindHoldButton(id, mode) {
      const btn = document.getElementById(id);

      const start = (e) => {
        e.preventDefault();
        startRepeating(mode);
      };

      const stop = (e) => {
        e.preventDefault();
        stopRepeating();
        sendMode('STOP');
      };

      btn.addEventListener('mousedown', start);
      btn.addEventListener('mouseup', stop);
      btn.addEventListener('mouseleave', stop);

      btn.addEventListener('touchstart', start, { passive: false });
      btn.addEventListener('touchend', stop, { passive: false });
      btn.addEventListener('touchcancel', stop, { passive: false });
    }

    bindHoldButton('forward', 'FORWARD');
    bindHoldButton('backward', 'BACKWARD');
    bindHoldButton('left', 'RIGHT');
    bindHoldButton('right', 'LEFT');
    bindHoldButton('rotate_ccw', 'ROTATE_CW');
    bindHoldButton('rotate_cw', 'ROTATE_CCW');

    document.getElementById('stop').addEventListener('click', async (e) => {
      e.preventDefault();
      stopRepeating();
      await sendMode('STOP');
    });

    modeAutoBtn.addEventListener('click', async (e) => {
      e.preventDefault();
      await setControlMode('AUTO');
    });

    modeManualBtn.addEventListener('click', async (e) => {
      e.preventDefault();
      await setControlMode('MANUAL');
    });

    refreshControlMode();
    refreshState();
    setInterval(refreshState, 500);
  </script>
</body>
</html>
